services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:///./data/app.sqlite3
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - ./demo:/app/demo:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_SHOW_FACE_DEBUG_ERRORS: ${NEXT_PUBLIC_SHOW_FACE_DEBUG_ERRORS:-false}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_SHOW_FACE_DEBUG_ERRORS: ${NEXT_PUBLIC_SHOW_FACE_DEBUG_ERRORS:-false}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
